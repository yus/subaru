<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🍥 Subaru · Portal Clock</title>
    <style>
        /* ----- yusdesign B&W core ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --border: #cbd5e1;
            --accent: #334155;
            --subaru: #64748b;
            --shadow: rgba(0, 0, 0, 0.05);
            --modal-bg: rgba(15, 23, 42, 0.6);
            --radius: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #e2e8f0;
                --border: #334155;
                --accent: #94a3b8;
                --subaru: #8193b2;
                --shadow: rgba(255, 255, 255, 0.05);
                --modal-bg: rgba(0, 0, 0, 0.7);
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'SF Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background 0.2s, color 0.2s;
            touch-action: none;
        }

        /* ----- Main UI (full screen) ----- */
        .main-ui {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.2rem 1.2rem 0.8rem;
            overflow: hidden;
            position: relative;
        }

        /* Clock area */
        .clock-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        #mainClock {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            display: block;
            background: var(--bg);
            border-radius: 50%;
            border: 1px solid var(--border);
            touch-action: none;
        }

        /* Knobs row */
        .knobs {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 0.8rem 0 0.4rem;
        }

        .knob {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            max-width: 160px;
            text-align: center;
        }

        .knob.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .knob:active {
            transform: scale(0.96);
        }

        /* Caption */
        .caption {
            text-align: center;
            padding: 0.4rem 0.0.8rem;
            min-height: 3.2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .caption .hebrew {
            font-family: 'Times New Roman', serif;
            font-size: 2.2rem;
            line-height: 1.2;
        }

        .caption .name {
            font-size: 0.85rem;
            color: var(--subaru);
            letter-spacing: 0.5px;
        }

        .caption .time {
            font-size: 0.7rem;
            color: var(--subaru);
        }

        /* ----- Pull tab (for modals) ----- */
        .pull-tab {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 0.4rem auto 0;
            transition: background 0.2s;
            touch-action: none;
        }

        /* ----- Modals (slide-up) ----- */
        .modal-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            background: var(--modal-bg);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-sheet {
            background: var(--bg);
            border-radius: var(--radius) var(--radius) 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            padding: 1.5rem 1.5rem 2rem;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
            border-top: 1px solid var(--border);
            box-shadow: 0 -8px 30px var(--shadow);
        }

        .modal-overlay.open .modal-sheet {
            transform: translateY(0);
        }

        .modal-sheet .close-btn {
            float: right;
            background: none;
            border: none;
            font-size: 1.6rem;
            color: var(--text);
            cursor: pointer;
            padding: 0 0.4rem;
            line-height: 1;
        }

        .modal-sheet h2 {
            font-size: 1.1rem;
            font-weight: normal;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.6rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* Settings items */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .setting-row:last-child {
            border-bottom: none;
        }

        .toggle-group {
            display: flex;
            gap: 0.4rem;
        }

        .toggle-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
        }

        .toggle-btn.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        .info-text {
            color: var(--subaru);
            font-size: 0.7rem;
            padding: 0.4rem 0;
        }

        /* Portal list inside modal */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .portal-item {
            padding: 0.4rem 0.2rem;
            border: 1px solid var(--border);
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.1s;
        }

        .portal-item:active {
            background: var(--border);
        }

        .portal-item .p-hebrew {
            font-family: 'Times New Roman', serif;
            font-size: 1.2rem;
        }
        .portal-item .p-time {
            color: var(--subaru);
            font-size: 0.6rem;
        }

        .portal-item.current {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* ----- Responsive ----- */
        @media (max-width: 480px) {
            .knob {
                font-size: 0.7rem;
                padding: 0.5rem 0.8rem;
            }
            .caption .hebrew {
                font-size: 1.8rem;
            }
            #mainClock {
                max-width: 320px;
            }
        }

        /* hide scrollbar */
        .modal-sheet::-webkit-scrollbar {
            width: 4px;
        }
        .modal-sheet::-webkit-scrollbar-track {
            background: var(--bg);
        }
        .modal-sheet::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- ===== MAIN UI ===== -->
    <div class="main-ui" id="mainUI">
        <div class="clock-area">
            <canvas id="mainClock" width="500" height="500"></canvas>
        </div>

        <div class="knobs">
            <button class="knob active" id="realBtn">▶ real</button>
            <button class="knob" id="nextBtn">⏭ next</button>
        </div>

        <div class="caption" id="caption">
            <div class="hebrew" id="currentHeb">א</div>
            <div class="name" id="currentName">Aleph · Breath</div>
            <div class="time" id="currentTime">00:00:00</div>
        </div>

        <div class="pull-tab" id="pullTab"></div>
    </div>

    <!-- ===== MODAL OVERLAYS ===== -->
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-sheet">
            <button class="close-btn" data-close="settingsModal">✕</button>
            <h2>⚙️ settings</h2>
            <div class="setting-row">
                <span>theme</span>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="themeLight">☀ light</button>
                    <button class="toggle-btn" id="themeDark">☾ dark</button>
                </div>
            </div>
            <div class="setting-row">
                <span>clock scale</span>
                <div class="toggle-group">
                    <button class="toggle-btn active" id="scale24">24h</button>
                    <button class="toggle-btn" id="scale22">22h</button>
                </div>
            </div>
            <div class="setting-row">
                <span>subaru hand</span>
                <span style="color:var(--subaru); font-size:0.8rem;">0.336s · 178/s</span>
            </div>
            <div class="setting-row">
                <span>portal interval</span>
                <span style="color:var(--subaru); font-size:0.8rem;">3927.27s</span>
            </div>
            <div class="info-text">
                tap clock to freeze · tap again to resume
            </div>
        </div>
    </div>

    <!-- Portals Modal -->
    <div class="modal-overlay" id="portalsModal">
        <div class="modal-sheet">
            <button class="close-btn" data-close="portalsModal">✕</button>
            <h2>🌀 22 portals</h2>
            <div class="portal-grid" id="portalGrid"></div>
        </div>
    </div>

    <script>
        (function() {
            // ----- DATA -----
            const HEBREW = ['א','ב','ג','ד','ה','ו','ז','ח','ט','י','כ','ל','מ','נ','ס','ע','פ','צ','ק','ר','ש','ת'];
            const NAMES = [
                'Aleph · Breath','Bet · House','Gimel · Nourish','Dalet · Door','He · Window',
                'Vav · Connect','Zayin · Sustain','Chet · Life','Tet · Goodness','Yod · Spark',
                'Kaf · Crown','Lamed · Teach','Mem · Waters','Nun · Faith','Samekh · Support',
                'Ayin · Vision','Pe · Mouth','Tsadi · Path','Qof · Holiness','Resh · Mind',
                'Shin · Fire','Tav · Truth'
            ];
            const MEANINGS_SHORT = [
                'Breath','House','Nourish','Door','Window','Connect','Sustain','Life','Goodness','Spark',
                'Crown','Teach','Waters','Faith','Support','Vision','Mouth','Path','Holiness','Mind','Fire','Truth'
            ];

            // Overlap times (12/11 hour intervals)
            const OVERLAPS = [];
            const INTERVAL = 12/11; // hours
            for (let i = 0; i < 22; i++) {
                const totalMin = i * INTERVAL * 60;
                const h = Math.floor(totalMin / 60) % 24;
                const m = Math.floor(totalMin % 60);
                const s = Math.floor((totalMin % 1) * 60);
                OVERLAPS.push({
                    index: i,
                    hebrew: HEBREW[i],
                    name: NAMES[i],
                    meaning: MEANINGS_SHORT[i],
                    hours: h,
                    minutes: m,
                    seconds: s,
                    totalMinutes: totalMin,
                    display: `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`
                });
            }

            // ----- STATE -----
            let mode = '24h'; // '24h' or '22h'
            let dark = false;
            let frozen = false;
            let frozenTime = null;
            let subaruRotations = 0;
            let prevSubaruAngle = 0;
            let realMode = true; // true = real time, false = next portal mode
            let realStartTime = performance.now() / 1000;
            let realOffset = 0; // will be set from Date

            // DOM refs
            const canvas = document.getElementById('mainClock');
            const ctx = canvas.getContext('2d');
            const currentHeb = document.getElementById('currentHeb');
            const currentName = document.getElementById('currentName');
            const currentTime = document.getElementById('currentTime');
            const realBtn = document.getElementById('realBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pullTab = document.getElementById('pullTab');

            // Modals
            const settingsModal = document.getElementById('settingsModal');
            const portalsModal = document.getElementById('portalsModal');
            const portalGrid = document.getElementById('portalGrid');
            const closeBtns = document.querySelectorAll('[data-close]');

            // Settings toggles
            const themeLight = document.getElementById('themeLight');
            const themeDark = document.getElementById('themeDark');
            const scale24 = document.getElementById('scale24');
            const scale22 = document.getElementById('scale22');

            // ----- CONSTANTS -----
            const SUBARU_PERIOD = 0.336;
            const HOUR_24_PERIOD = 12 * 3600;
            const HOUR_22_PERIOD = 3927.27 * 22;
            const MINUTE_PERIOD = 3600;
            const SECOND_PERIOD = 60;

            // ----- HELPERS -----
            function getAngle(period, t) {
                return ((t % period) / period) * 360;
            }

            function getLetterIndex(angleDeg, count) {
                return Math.floor((angleDeg % 360) / 360 * count) % count;
            }

            function findNearestOverlap(minutes) {
                let best = 0, bestDiff = Infinity;
                for (let i = 0; i < OVERLAPS.length; i++) {
                    const diff = Math.abs(OVERLAPS[i].totalMinutes - minutes);
                    if (diff < bestDiff) { bestDiff = diff; best = i; }
                }
                return best;
            }

            function findNextOverlap(minutes) {
                for (let i = 0; i < OVERLAPS.length; i++) {
                    if (OVERLAPS[i].totalMinutes > minutes) return i;
                }
                return 0;
            }

            function formatTime(seconds) {
                const h = Math.floor(seconds / 3600) % 24;
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }

            function getCurrentTimeSeconds() {
                const now = new Date();
                return now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds() + now.getMilliseconds() / 1000;
            }

            // ----- DRAWING -----
            function drawClock(t) {
                const w = canvas.width, h = canvas.height;
                const cx = w/2, cy = h/2;
                const R = Math.min(w, h) * 0.42;
                const isDark = dark;

                ctx.clearRect(0, 0, w, h);

                // bg
                ctx.fillStyle = isDark ? '#0f172a' : '#f8fafc';
                ctx.fillRect(0, 0, w, h);

                // outer circle
                ctx.beginPath();
                ctx.arc(cx, cy, R, 0, 2 * Math.PI);
                ctx.strokeStyle = isDark ? '#334155' : '#cbd5e1';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 22 marks (Hebrew letters) — highlight current segment
                const count = 22;
                const nowMinutes = (t % 86400) / 60;
                const nearestIdx = findNearestOverlap(nowMinutes);
                const nextIdx = (nearestIdx + 1) % 22;
                const segStart = OVERLAPS[nearestIdx].totalMinutes;
                let segEnd = OVERLAPS[nextIdx].totalMinutes;
                if (segEnd < segStart) segEnd += 24 * 60;
                const progress = (nowMinutes - segStart) / (segEnd - segStart);

                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * 2 * Math.PI - Math.PI/2;
                    const nextAngle = ((i+1) / count) * 2 * Math.PI - Math.PI/2;

                    // highlight current segment
                    if (i === nearestIdx) {
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.arc(cx, cy, R, angle, nextAngle);
                        ctx.closePath();
                        ctx.fillStyle = isDark ? 'rgba(148, 163, 184, 0.15)' : 'rgba(51, 65, 85, 0.10)';
                        ctx.fill();
                    }

                    // tick marks
                    const x1 = cx + (R - 12) * Math.cos(angle);
                    const y1 = cy + (R - 12) * Math.sin(angle);
                    const x2 = cx + (R + 4) * Math.cos(angle);
                    const y2 = cy + (R + 4) * Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = isDark ? '#94a3b8' : '#334155';
                    ctx.lineWidth = (i === nearestIdx) ? 2 : 1;
                    ctx.stroke();

                    // letter (only every 2nd)
                    if (i % 2 === 0) {
                        const xText = cx + (R - 24) * Math.cos(angle);
                        const yText = cy + (R - 24) * Math.sin(angle) + 5;
                        ctx.font = '11px "Times New Roman", serif';
                        ctx.fillStyle = (i === nearestIdx) ? (isDark ? '#e2e8f0' : '#0f172a') : (isDark ? '#64748b' : '#94a3b8');
                        ctx.textAlign = 'center';
                        ctx.fillText(HEBREW[i], xText, yText);
                    }
                }

                // ----- HANDS -----
                const hourPeriod = mode === '24h' ? HOUR_24_PERIOD : HOUR_22_PERIOD;
                const hourAngle = getAngle(hourPeriod, t) - 90;
                const minuteAngle = getAngle(MINUTE_PERIOD, t) - 90;
                const secondAngle = getAngle(SECOND_PERIOD, t) - 90;
                const subaruAngle = getAngle(SUBARU_PERIOD, t) - 90;

                // hour
                let hx = cx + R * 0.5 * Math.cos(hourAngle * Math.PI/180);
                let hy = cy + R * 0.5 * Math.sin(hourAngle * Math.PI/180);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(hx, hy);
                ctx.strokeStyle = isDark ? '#e2e8f0' : '#0f172a';
                ctx.lineWidth = 3;
                ctx.stroke();

                // minute
                let mx = cx + R * 0.7 * Math.cos(minuteAngle * Math.PI/180);
                let my = cy + R * 0.7 * Math.sin(minuteAngle * Math.PI/180);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(mx, my);
                ctx.strokeStyle = isDark ? '#94a3b8' : '#475569';
                ctx.lineWidth = 2;
                ctx.stroke();

                // second
                let sx = cx + R * 0.85 * Math.cos(secondAngle * Math.PI/180);
                let sy = cy + R * 0.85 * Math.sin(secondAngle * Math.PI/180);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(sx, sy);
                ctx.strokeStyle = isDark ? '#8193b2' : '#64748b';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // ----- SUBARU HAND (inner) -----
                const subR = R * 0.40;
                ctx.beginPath();
                ctx.arc(cx, cy, subR, 0, 2 * Math.PI);
                ctx.strokeStyle = isDark ? '#334155' : '#cbd5e1';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 5]);
                ctx.stroke();
                ctx.setLineDash([]);

                let subx = cx + subR * 0.85 * Math.cos(subaruAngle * Math.PI/180);
                let suby = cy + subR * 0.85 * Math.sin(subaruAngle * Math.PI/180);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(subx, suby);
                ctx.strokeStyle = isDark ? '#e2e8f0' : '#0f172a';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
                ctx.fillStyle = isDark ? '#e2e8f0' : '#0f172a';
                ctx.fill();

                // ----- Update subaru counter (silent) -----
                const newSubaruAngle = getAngle(SUBARU_PERIOD, t);
                if (newSubaruAngle < prevSubaruAngle) subaruRotations++;
                prevSubaruAngle = newSubaruAngle;

                // ----- Update caption -----
                const portal = OVERLAPS[nearestIdx];
                currentHeb.textContent = portal.hebrew;
                currentName.textContent = portal.name;
                currentTime.textContent = portal.display;

                // highlight portal in grid if open
                document.querySelectorAll('.portal-item').forEach((el, i) => {
                    el.classList.toggle('current', i === nearestIdx);
                });
            }

            // ----- PORTAL LIST (modal) -----
            function buildPortalGrid() {
                portalGrid.innerHTML = '';
                OVERLAPS.forEach((p, i) => {
                    const div = document.createElement('div');
                    div.className = 'portal-item';
                    div.innerHTML = `<div class="p-hebrew">${p.hebrew}</div><div class="p-time">${p.display}</div>`;
                    div.addEventListener('click', () => {
                        frozen = true;
                        frozenTime = p.totalMinutes * 60;
                        realMode = false;
                        realBtn.classList.remove('active');
                        nextBtn.classList.add('active');
                        closeModal('portalsModal');
                    });
                    portalGrid.appendChild(div);
                });
            }

            // ----- MODAL CONTROLS -----
            function openModal(id) {
                document.getElementById(id).classList.add('open');
            }

            function closeModal(id) {
                document.getElementById(id).classList.remove('open');
            }

            closeBtns.forEach(btn => {
                btn.addEventListener('click', () => closeModal(btn.dataset.close));
            });

            // Pull tab: open settings on tap, portals on swipe-up? For simplicity: tap opens settings, long-press opens portals? We'll use double-tap.
            let pullTapCount = 0;
            let pullTapTimer;
            pullTab.addEventListener('click', () => {
                pullTapCount++;
                if (pullTapCount === 1) {
                    pullTapTimer = setTimeout(() => {
                        if (pullTapCount === 1) openModal('settingsModal');
                        pullTapCount = 0;
                    }, 300);
                } else if (pullTapCount === 2) {
                    clearTimeout(pullTapTimer);
                    openModal('portalsModal');
                    pullTapCount = 0;
                }
            });

            // Also allow tap on clock to freeze/unfreeze
            canvas.addEventListener('click', () => {
                frozen = !frozen;
                if (frozen) {
                    frozenTime = performance.now() / 1000;
                    realBtn.classList.remove('active');
                    nextBtn.classList.add('active');
                } else {
                    frozenTime = null;
                    realBtn.classList.add('active');
                    nextBtn.classList.remove('active');
                }
            });

            // ----- KNOBS -----
            realBtn.addEventListener('click', () => {
                realMode = true;
                frozen = false;
                frozenTime = null;
                realBtn.classList.add('active');
                nextBtn.classList.remove('active');
            });

            nextBtn.addEventListener('click', () => {
                realMode = false;
                frozen = true;
                const now = performance.now() / 1000;
                const nowMinutes = (now % 86400) / 60;
                const nextIdx = findNextOverlap(nowMinutes);
                frozenTime = OVERLAPS[nextIdx].totalMinutes * 60;
                // add a small offset to show the portal time
                realBtn.classList.remove('active');
                nextBtn.classList.add('active');
            });

            // ----- SETTINGS TOGGLES -----
            themeLight.addEventListener('click', () => {
                dark = false;
                themeLight.classList.add('active');
                themeDark.classList.remove('active');
                updateTheme();
            });
            themeDark.addEventListener('click', () => {
                dark = true;
                themeDark.classList.add('active');
                themeLight.classList.remove('active');
                updateTheme();
            });

            scale24.addEventListener('click', () => {
                mode = '24h';
                scale24.classList.add('active');
                scale22.classList.remove('active');
            });
            scale22.addEventListener('click', () => {
                mode = '22h';
                scale22.classList.add('active');
                scale24.classList.remove('active');
            });

            function updateTheme() {
                document.documentElement.style.setProperty('--bg', dark ? '#0f172a' : '#f8fafc');
                document.documentElement.style.setProperty('--text', dark ? '#e2e8f0' : '#1e293b');
                document.documentElement.style.setProperty('--border', dark ? '#334155' : '#cbd5e1');
                document.documentElement.style.setProperty('--subaru', dark ? '#8193b2' : '#64748b');
                document.documentElement.style.setProperty('--shadow', dark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)');
            }

            // ----- ANIMATION LOOP -----
            function tick() {
                let t;
                if (frozen && frozenTime !== null) {
                    t = frozenTime;
                } else {
                    // real time with offset
                    const now = performance.now() / 1000;
                    t = now + (getCurrentTimeSeconds() - (now % 86400));
                    // keep t within 24h
                    t = t % 86400;
                }
                drawClock(t);
                requestAnimationFrame(tick);
            }

            // ----- INIT -----
            buildPortalGrid();
            // set initial offset so real time matches system clock
            const now = performance.now() / 1000;
            const systemSeconds = getCurrentTimeSeconds();
            realOffset = systemSeconds - (now % 86400);
            // start
            tick();

            // close modals on background click
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('open');
                    }
                });
            });

            // Prevent body scroll when modal open
            document.querySelectorAll('.modal-overlay').forEach(m => {
                m.addEventListener('touchmove', (e) => {
                    if (e.target.closest('.modal-sheet')) return;
                    e.preventDefault();
                }, { passive: false });
            });
        })();
    </script>

</body>
</html>

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --omit=optional --ignore-scripts

      # CRITICAL: Add Android platform BEFORE sync
      # - name: Add Android platform
        # run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate icons (using rsvg-convert)
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          mkdir -p android/app/src/main/res
          for size in 48 72 96 144 192; do
            case $size in
              48) folder="mipmap-mdpi" ;;
              72) folder="mipmap-hdpi" ;;
              96) folder="mipmap-xhdpi" ;;
              144) folder="mipmap-xxhdpi" ;;
              192) folder="mipmap-xxxhdpi" ;;
            esac
            mkdir -p android/app/src/main/res/$folder
            rsvg-convert -w $size -h $size public/icon.svg > android/app/src/main/res/$folder/ic_launcher.png
            rsvg-convert -w $size -h $size public/icon.svg > android/app/src/main/res/$folder/ic_launcher_round.png
          done

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: subaru-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
